<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Chatbot</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; height: 100vh; display: flex; }

    /* Sidebar */
    .sidebar { width: 256px; background: #111827; color: #fff; display: flex; flex-direction: column; height: 100vh; flex-shrink: 0; }
    .sidebar-header { padding: 16px; }
    .new-chat-btn { width: 100%; padding: 8px 16px; background: #374151; border: none; color: #fff; border-radius: 8px; cursor: pointer; font-size: 14px; }
    .new-chat-btn:hover { background: #4b5563; }
    .conv-list { flex: 1; overflow-y: auto; padding: 0 8px; }
    .conv-item { display: flex; align-items: center; justify-content: space-between; padding: 8px 12px; margin-bottom: 4px; border-radius: 8px; cursor: pointer; font-size: 14px; color: #d1d5db; }
    .conv-item:hover { background: #1f2937; }
    .conv-item.active { background: #374151; color: #fff; }
    .conv-item span { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
    .conv-delete { display: none; background: none; border: none; color: #9ca3af; cursor: pointer; font-size: 18px; margin-left: 8px; flex-shrink: 0; }
    .conv-item:hover .conv-delete { display: block; }
    .conv-delete:hover { color: #f87171; }

    /* Main area */
    .main { flex: 1; display: flex; flex-direction: column; height: 100vh; }

    /* Messages */
    .messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 16px; }
    .empty-state { flex: 1; display: flex; align-items: center; justify-content: center; color: #9ca3af; text-align: center; }
    .msg { display: flex; }
    .msg.user { justify-content: flex-end; }
    .msg.assistant { justify-content: flex-start; }
    .msg-bubble { max-width: 70%; padding: 8px 16px; border-radius: 16px; white-space: pre-wrap; word-wrap: break-word; line-height: 1.5; }
    .msg.user .msg-bubble { background: #2563eb; color: #fff; }
    .msg.assistant .msg-bubble { background: #e5e7eb; color: #111827; }

    /* Input */
    .input-area { border-top: 1px solid #e5e7eb; padding: 16px; }
    .input-row { display: flex; gap: 8px; max-width: 768px; margin: 0 auto; }
    .input-row textarea { flex: 1; resize: none; border-radius: 12px; border: 1px solid #d1d5db; padding: 8px 16px; font-size: 14px; font-family: inherit; outline: none; }
    .input-row textarea:focus { border-color: #2563eb; box-shadow: 0 0 0 2px rgba(37,99,235,0.2); }
    .send-btn { padding: 8px 16px; background: #2563eb; color: #fff; border: none; border-radius: 12px; cursor: pointer; font-size: 14px; }
    .send-btn:hover { background: #1d4ed8; }
    .send-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  </style>
</head>
<body>
  <aside class="sidebar">
    <div class="sidebar-header">
      <button class="new-chat-btn" onclick="createNewChat()">+ New Chat</button>
    </div>
    <nav class="conv-list" id="convList"></nav>
  </aside>

  <div class="main">
    <div class="messages" id="messages">
      <div class="empty-state" id="emptyState">
        <div>
          <h2 style="font-size:24px;font-weight:600;margin-bottom:8px;">AI Chatbot</h2>
          <p>Create a new chat or select an existing conversation.</p>
        </div>
      </div>
    </div>
    <div class="input-area">
      <div class="input-row">
        <textarea id="input" rows="1" placeholder="Type a message..." onkeydown="handleKey(event)"></textarea>
        <button class="send-btn" id="sendBtn" onclick="sendMessage()">Send</button>
      </div>
    </div>
  </div>

  <script>
    let currentConversationId = null;
    let isLoading = false;

    // Parse conversation ID from URL
    function getConversationIdFromUrl() {
      const m = window.location.pathname.match(/\/chat\/(.+)/);
      return m ? m[1] : null;
    }

    // Navigation
    function navigateTo(path) {
      history.pushState(null, '', path);
      currentConversationId = getConversationIdFromUrl();
      if (currentConversationId) {
        loadConversation(currentConversationId);
      } else {
        showEmptyState();
      }
      loadConversations();
    }

    window.addEventListener('popstate', () => {
      currentConversationId = getConversationIdFromUrl();
      if (currentConversationId) loadConversation(currentConversationId);
      else showEmptyState();
      loadConversations();
    });

    // Conversations sidebar
    async function loadConversations() {
      const res = await fetch('/api/conversations');
      const convs = await res.json();
      const list = document.getElementById('convList');
      list.innerHTML = convs.map(c => `
        <div class="conv-item ${c.id === currentConversationId ? 'active' : ''}" onclick="navigateTo('/chat/${c.id}')">
          <span>${escapeHtml(c.title)}</span>
          <button class="conv-delete" onclick="event.stopPropagation(); deleteChat('${c.id}')">&times;</button>
        </div>
      `).join('');
    }

    async function createNewChat() {
      const res = await fetch('/api/conversations', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ title: 'New Chat' }),
      });
      const conv = await res.json();
      navigateTo(`/chat/${conv.id}`);
    }

    async function deleteChat(id) {
      await fetch(`/api/conversations/${id}`, { method: 'DELETE' });
      if (currentConversationId === id) navigateTo('/chat');
      else loadConversations();
    }

    // Messages
    function showEmptyState() {
      const el = document.getElementById('messages');
      el.innerHTML = `<div class="empty-state"><div>
        <h2 style="font-size:24px;font-weight:600;margin-bottom:8px;">AI Chatbot</h2>
        <p>Create a new chat or select an existing conversation.</p>
      </div></div>`;
    }

    async function loadConversation(id) {
      const res = await fetch(`/api/conversations/${id}`);
      const data = await res.json();
      const el = document.getElementById('messages');
      if (!data.messages || data.messages.length === 0) {
        el.innerHTML = `<div class="empty-state"><p>Send a message to start the conversation.</p></div>`;
      } else {
        el.innerHTML = data.messages.map(m =>
          `<div class="msg ${m.role}"><div class="msg-bubble">${escapeHtml(m.content)}</div></div>`
        ).join('');
        el.scrollTop = el.scrollHeight;
      }
    }

    function appendMessage(role, content) {
      const el = document.getElementById('messages');
      // Remove empty state if present
      const empty = el.querySelector('.empty-state');
      if (empty) empty.remove();

      const div = document.createElement('div');
      div.className = `msg ${role}`;
      div.innerHTML = `<div class="msg-bubble">${escapeHtml(content)}</div>`;
      el.appendChild(div);
      el.scrollTop = el.scrollHeight;
      return div;
    }

    async function sendMessage() {
      const input = document.getElementById('input');
      const text = input.value.trim();
      if (!text || isLoading || !currentConversationId) return;

      input.value = '';
      isLoading = true;
      document.getElementById('sendBtn').disabled = true;

      appendMessage('user', text);

      // Build message history from DOM
      const msgEls = document.querySelectorAll('#messages .msg');
      const messages = Array.from(msgEls).map(el => ({
        role: el.classList.contains('user') ? 'user' : 'assistant',
        content: el.querySelector('.msg-bubble').textContent,
      }));

      // Create assistant bubble for streaming
      const assistantDiv = appendMessage('assistant', '');
      const bubble = assistantDiv.querySelector('.msg-bubble');

      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ conversationId: currentConversationId, messages }),
        });

        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let fullText = '';

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          const chunk = decoder.decode(value, { stream: true });
          fullText += chunk;
          bubble.textContent = fullText;
          document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
        }
      } catch (err) {
        bubble.textContent = 'Error: ' + err.message;
      }

      isLoading = false;
      document.getElementById('sendBtn').disabled = false;
      loadConversations(); // Refresh sidebar for title update
    }

    function handleKey(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // Init
    currentConversationId = getConversationIdFromUrl();
    loadConversations();
    if (currentConversationId) loadConversation(currentConversationId);
  </script>
</body>
</html>
